# libcat Hugo module -- default (English) UI chrome (tasks/016). Hugo merges a
# module's i18n bundle into the importing site, so these are the defaults every
# adopter gets. To translate, add i18n/<lang>.toml with the same keys (missing keys
# fall back to the default content language) -- no template fork. See README.

# Facet sidebar + navigation
[facets]
other = "Facets"

[filterWorks]
other = "Filter works"

[filterFacet]
other = "Filter…"

[subjects]
other = "Subjects"

[formats]
other = "Formats"

# The Work's series membership(s), each with its own enumeration (tasks/309).
[series]
other = "Series"

[genresAndTags]
other = "Genres & tags"

[languages]
other = "Languages"

[classifications]
other = "Classifications"

[contributors]
other = "Contributors"

# Work detail page
[aboutTitle]
other = "About this title"

[details]
other = "Details"

[language]
other = "Language"

[classification]
other = "Classification"

[editionsAndFormats]
other = "Editions & formats"

[isbn]
other = "ISBN"

[relatedWorks]
other = "Related works"

[partOf]
other = "Part of"

[contains]
other = "Contains"

[moreLikeThis]
other = "More like this"

# The rail is computed, not catalogued. Say so where the reader can see it, so a
# surprising recommendation reads as a machine's guess rather than a librarian's
# assertion (tasks/284).
[moreLikeThisNote]
other = "Suggested automatically from shared subjects, tags, contributors and series."

[sharesLabel]
other = "Shares"

# Reveals the neighbours past [params] similarShown. Only rendered when the
# sidecar carries more than the page opens with (tasks/310).
[viewMore]
other = "View more"

# The page a merged Work id forwards from (tasks/313). Read only when a reader's
# browser ignores the meta refresh, so it has to stand on its own.
[retiredHeading]
other = "This record has moved"

[retiredMoved]
other = "The record you asked for was merged into another. You are being taken there now."

[retiredContinue]
other = "Continue to the current record"

[backToAllWorks]
other = "Back to all works"

[authorityRecordFor]
other = "Authority record for {{ .Label }}"

# Header navigation (tasks/118)
[primaryNav]
other = "Primary"

# SEO head (tasks/119): the synthesized meta description for a Work page
# without one of its own.
[workMetaDescription]
other = "{{ .Title }} by {{ .Authors }} · {{ .SiteTitle }}"

# Search form
[searchLabel]
other = "Search the catalog"

[searchPlaceholder]
other = "Search titles, authors, subjects…"

[searchButton]
other = "Search"

[searchClose]
other = "Close"

# Result / term counts (CLDR plural forms; .Count is the number of works)
[workCount]
one = "{{ .Count }} work"
other = "{{ .Count }} works"

# Browse-mode result labels (tasks/281). lcat-browse.js reads these off
# #lcat-results as data attributes, so they localize with the page; before, the
# script's English fallbacks shipped to every language. browseShowing's {shown},
# {total} and {results} placeholders are substituted by the script.
[browseNoResults]
other = "No matches"

[browseResultsWord]
other = "results"

[browseShowing]
other = "showing the first {shown} of {total} {results}"

# Browse result pager (tasks/301). browseShowingRange labels a later page (the
# window no longer starts at one); {from}, {to}, {total}, {results} are
# substituted by the script. The browsePager* strings name the pager's nav
# landmark, its prev/next controls, and each numbered link ("Page {n}").
[browseShowingRange]
other = "showing {from}–{to} of {total} {results}"

[browsePagerLabel]
other = "Search results pages"

[browsePagerPrev]
other = "Previous"

[browsePagerNext]
other = "Next"

[browsePagerPage]
other = "Page {n}"

[darkMode]
other = "Dark mode"

[lightMode]
other = "Light mode"

# Negative facet filters (tasks/144, opt-in via [params.facets] negatives).
# excludedTerm/removeExclusion pass through to the client script with .Label
# = "%s"; the script substitutes the term's display label.
[excludeTerm]
other = "Exclude {{ .Label }}"

[excludedTerm]
other = "Not {{ .Label }}"

[removeExclusion]
other = "Remove exclusion of {{ .Label }}"
