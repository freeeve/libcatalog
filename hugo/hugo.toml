# Module config merged into any site that imports the libcat Hugo module.
# It declares the facet taxonomies the content adapter populates, so importing the
# module is enough to get faceted navigation -- the site need only mount the
# projected catalog.json / facets.json under assets/ (see exampleSite).

[module]
  [module.hugoVersion]
    min = "0.146.0" # content adapters (>= 0.126) + the flat template system (>= 0.146)

# Facet dimensions. NOTE: Hugo does not merge a module's [taxonomies] into the
# importing site, so the site must also declare this block (see README / exampleSite);
# it is kept here as the canonical reference to copy. Each maps a taxonomy name ->
# the page param the adapter sets; the keys mirror catalog.json field names.
[taxonomies]
  language = "languages"
  subject = "subjects"       # controlled-vocabulary subjects (labels; tasks/012)
  tag = "tags"               # uncontrolled feed genre strings (tasks/012)
  format = "formats"         # ebook / audiobook, per-Instance format (tasks/011)
  contributor = "contributors"
  classification = "classifications"

[params]
  # catalogSchemaVersion the module targets; the adapter fails the build loudly on
  # a mismatch with catalog.json's top-level "version" (tasks/009 contract).
  # Release checklist: this default and project.SchemaVersion move together --
  # the mismatch only surfaces at an adopter's render (tasks/179).
  catalogSchemaVersion = 11

  # Multi-vocabulary subjects (tasks/141). The facet sidebar renders one group
  # per vocabulary scheme; [[params.subjectSchemes]] sets group order and display
  # names (schemes omitted here follow, labeled by their code). Like [taxonomies],
  # Hugo does NOT merge a module's params arrays into the importing site
  # (tasks/133 gotcha) -- declare this block site-side. Example:
  #
  #   [[params.subjectSchemes]]
  #     scheme = "homosaurus"
  #     name = "Homosaurus"
  #   [[params.subjectSchemes]]
  #     scheme = "fast"
  #     name = "FAST"
  #
  # facetLimit caps the entries rendered per facet group (default 20); groups
  # with more than 10 entries get a client-side type-to-filter box.
  #facetLimit = 20

  # Deployment-defined facet dimensions (tasks/143): lift a Work extras key
  # into a real faceted taxonomy -- sidebar group, term pages, counts. Declare
  # BOTH the [taxonomies] entry and the [params.extraFacets.<name>] block
  # site-side (the [taxonomies] merge gotcha above applies; these are the
  # site's dimensions anyway). <name> is the taxonomy plural / page param
  # (lowercase); the group heading resolves i18n key <name>, then `title`,
  # then the humanized name. Example (a "sources" facet from a CSV extra):
  #
  #   [taxonomies]
  #     source = "sources"          # ...plus the six module dimensions
  #   [params.extraFacets.sources]
  #     extra = "sources"           # extras key (default: the entry name)
  #     split = ","                 # omit for single-valued extras
  #     title = "Sources"

  # Negative facet filters (tasks/144), OFF by default: exclusion UI (and
  # x<taxonomy>=<term> URL state) is not every catalog's call. When enabled,
  # each facet row gets an exclude button, exclusions render as dismissible
  # "Not X" chips above the results, and result cards carrying an excluded
  # term hide client-side (current page only -- plain term pages stay
  # precomputed HTML). Buttons, not links: exclusion URLs are not crawlable.
  #
  #   [params.facets]
  #     negatives = true

  # Shared facet sidebar (tasks/150), OFF by default: the sidebar is
  # page-invariant per language, and inlining it multiplies its bytes by
  # every list/term page -- at catalog scale it dominates the deploy. When
  # enabled, the sidebar publishes once per language as a fingerprinted
  # fragment (/lcat/facets.<lang>.<hash>.html, immutable-cacheable) that
  # lcat-sidebar.js fetches and inserts; pages ship only a small host with
  # no-JS fallback links to the facet taxonomy landing pages. Small catalogs
  # should keep the inlined default (no fetch, sidebar in the crawled HTML).
  #
  #   [params.facets]
  #     shared = true
