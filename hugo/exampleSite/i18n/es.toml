# Negative facet filters.
[excludeTerm]
other = "Excluir {{ .Label }}"

[excludedTerm]
other = "Sin {{ .Label }}"

[removeExclusion]
other = "Quitar la exclusión de {{ .Label }}"

# Language display names: "lang-<639-2 code>" overrides the
# module's shipped English name table (data/lcat/languageNames.toml) per
# code -- translate only the codes the corpus carries.

["lang-eng"]
