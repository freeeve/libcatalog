# Spanish UI chrome for the bilingual exampleSite (tasks/016). This is an ADOPTER
# artifact -- the module ships only i18n/en.toml; a site translates by adding a table
# like this one. Any key omitted here falls back to the module's English default, so
# a partial translation still builds. No template fork required.

[facets]
other = "Facetas"

[filterWorks]
other = "Filtrar obras"

[subjects]
other = "Materias"

[formats]
other = "Formatos"

[series]
other = "Serie"

[genresAndTags]
other = "Géneros y etiquetas"

[languages]
other = "Idiomas"

[classifications]
other = "Clasificaciones"

[contributors]
other = "Colaboradores"

[language]
other = "Idioma"

[classification]
other = "Clasificación"

[editionsAndFormats]
other = "Ediciones y formatos"

[isbn]
other = "ISBN"

[moreLikeThis]
other = "Obras similares"

[moreLikeThisNote]
other = "Sugerencias automáticas a partir de materias, etiquetas, autores y series compartidas."

[sharesLabel]
other = "Comparte"

[viewMore]
other = "Ver más"

[backToAllWorks]
other = "Volver a todas las obras"

[authorityRecordFor]
other = "Registro de autoridad de {{ .Label }}"

[primaryNav]
other = "Principal"

[workMetaDescription]
other = "{{ .Title }} de {{ .Authors }} · {{ .SiteTitle }}"

[searchLabel]
other = "Buscar en el catálogo"

[searchPlaceholder]
other = "Buscar títulos, autores, materias…"

[searchButton]
other = "Buscar"

[searchClose]
other = "Cerrar"

[workCount]
one = "{{ .Count }} obra"
other = "{{ .Count }} obras"

# Deployment-defined facet heading (tasks/143): the i18n key named after the
# extraFacets entry wins over its config title.
[sources]
other = "Fuentes"

# Negative facet filters (tasks/144).
[excludeTerm]
other = "Excluir {{ .Label }}"

[excludedTerm]
other = "Sin {{ .Label }}"

[removeExclusion]
other = "Quitar la exclusión de {{ .Label }}"

# Language display names (tasks/142): "lang-<639-2 code>" overrides the
# module's shipped English name table (data/lcat/languageNames.toml) per
# code -- translate only the codes the corpus carries.

["lang-eng"]
other = "Inglés"

