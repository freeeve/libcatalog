baseURL = "https://example.org/"
title = "libcat example catalog"
languageCode = "en-us"

# Serve /robots.txt from the module's layouts/robots.txt. A module
# cannot set this -- it is site config -- so every adopter opts in here; without
# it Hugo emits no robots.txt and the module's template never runs.
enableRobotsTXT = true

# Bilingual demo: the module's content adapter calls .EnableAllLanguages,
# so a full Work-page set is minted for BOTH languages with no per-language content
# mount and no local copy of _content.gotmpl. UI chrome localizes from the module's
# i18n/en.toml defaults plus this site's i18n/es.toml -- no template fork.
defaultContentLanguage = "en"
[languages]
  [languages.en]
    weight = 1
    languageName = "English"
  [languages.es]
    weight = 2
    languageName = "Español"
    # Per-language menu names: a language block that defines menus
    # overrides the site-level [[menu.main]] wholesale for that language.
    [[languages.es.menus.main]]
      name = "Obras"
      url = "/works/"
      weight = 1
    [[languages.es.menus.main]]
      name = "Temas"
      url = "/subjects/"
      weight = 2

# Header navigation: the module renders [[menu.main]] as an accessible
# primary nav (aria-current on the active entry; a section landing stays active on
# its child pages). Sites without a main menu get no nav markup at all.
[[menu.main]]
  name = "Works"
  url = "/works/"
  weight = 1
[[menu.main]]
  name = "Subjects"
  url = "/subjects/"
  weight = 2
# The curated views are reachable only from their section index, and
# that index only from the menu -- nothing links a curated list automatically
#. An adopter who adds content/lists/ must add this entry too.
[[menu.main]]
  name = "Lists"
  url = "/lists/"
  weight = 3

# Import the libcat module (resolved locally via go.mod replace during dev).
[module]
  [[module.imports]]
    path = "github.com/freeeve/libcat/hugo"

[pagination]
  pagerSize = 10

# Cover art: opt in and the result cards + Work detail pages render a cover
# slot from each Work's `extra.cover` (forwarded to page params), falling back
# to a lettered placeholder when a Work has no cover. Off by default; this reference turns
# it on to show the slot (most works here have no cover, so they show the placeholder).
[params]
  covers = true

# Vocabulary groups for the subject facets: order + display names.
# Schemes not listed here still render, after these, labeled by their code.
[[params.subjectSchemes]]
  scheme = "homosaurus"
  name = "Homosaurus"
[[params.subjectSchemes]]
  scheme = "fast"
  name = "FAST"

# Search engine. "pagefind" swaps the header search box to the Pagefind
# Component UI -- real ranked, per-language, CJK-capable full-text over the built
# HTML. It needs one post-build step (`npm run search:index`, run after `hugo`).
# Remove this block (or set any other value) to fall back to the interim client-side
# substring filter, which needs no post-build step. Either way the no-JS form still
# submits to /works/.
[params.search]
  engine = "pagefind"

[taxonomies]
  language = "languages"
  subject = "subjects"
  tag = "tags"
  format = "formats"
  contributor = "contributors"
  classification = "classifications"
  source = "sources"               # deployment-defined dimension

# Deployment-defined facet: lifts each work's `extra.sources` CSV
# into a Sources facet -- sidebar group, /sources/ term pages, counts. Needs
# the matching [taxonomies] entry above. The heading prefers i18n key
# "sources" (es.toml says "Fuentes"), falling back to this title.
[params.extraFacets.sources]
  extra = "sources"
  split = ","
  title = "Sources"
  # Also surface this dimension as chips on each Work page, not just in
  # the browse sidebar. A curated "On these lists" dimension is declared the same way.
  onDetail = true

# Negative facet filters: every facet row gets an exclude button;
# active exclusions render as dismissible "Not X" chips above the results and
# ride the URL as x<taxonomy>=<term>. Off by default module-wide -- exclusion
# UI is not every catalog's call.
[params.facets]
  negatives = true

# Opt-in "suggest a subject" intake: the Subjects section on each Work
# page gets a link to this URL. {workID} and {title} are substituted (URL-encoded) so
# the form knows which Work. Point it at your own form, a mailto, or a suggestion
# endpoint; rename the link via the i18n key "suggestSubject" (e.g. "Suggest a
# Homosaurus subject"). Unset, nothing renders.
[params.suggest]
  subjectUrl = "https://example.org/suggest-subject?work={workID}&title={title}"

# Live availability: when enabled, lcat-availability.js fetches each
# edition's status client-side from the provider, keyed on the scheme-tagged id the
# projector emits (OverDrive: the Reserve ID). The example ships it DISABLED so the
# built site makes no external calls; flip enabled = true and set a real slug to try
# it against a live OverDrive library.
[params.availability]
  enabled = false
  [params.availability.overdrive]
    slug = "queerliblib"
    # If Thunder's CORS blocks the deploy origin, route through a proxy instead
    # (same normalized output); the proxy function is a deployment artifact:
    #   transport = "proxied"
    #   proxyUrl  = "https://your-edge-function.example/availability"
