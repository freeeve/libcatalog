baseURL = "https://example.org/"
title = "libcatalog example catalog"
languageCode = "en-us"

# Bilingual demo (tasks/016): the module's content adapter calls .EnableAllLanguages,
# so a full Work-page set is minted for BOTH languages with no per-language content
# mount and no local copy of _content.gotmpl. UI chrome localizes from the module's
# i18n/en.toml defaults plus this site's i18n/es.toml -- no template fork.
defaultContentLanguage = "en"
[languages]
  [languages.en]
    weight = 1
    languageName = "English"
  [languages.es]
    weight = 2
    languageName = "Español"

# Import the libcatalog module (resolved locally via go.mod replace during dev).
[module]
  [[module.imports]]
    path = "github.com/freeeve/libcatalog/hugo"

[pagination]
  pagerSize = 10

# Search engine (tasks/017). "pagefind" swaps the header search box to the Pagefind
# Component UI -- real ranked, per-language, CJK-capable full-text over the built
# HTML. It needs one post-build step (`npm run search:index`, run after `hugo`).
# Remove this block (or set any other value) to fall back to the interim client-side
# substring filter, which needs no post-build step. Either way the no-JS form still
# submits to /works/.
[params.search]
  engine = "pagefind"

[taxonomies]
  language = "languages"
  subject = "subjects"
  tag = "tags"
  format = "formats"
  contributor = "contributors"
  classification = "classifications"

# Live availability (tasks/004): when enabled, lcat-availability.js fetches each
# edition's status client-side from the provider, keyed on the scheme-tagged id the
# projector emits (OverDrive: the Reserve ID). The example ships it DISABLED so the
# built site makes no external calls; flip enabled = true and set a real slug to try
# it against a live OverDrive library.
[params.availability]
  enabled = false
  [params.availability.overdrive]
    slug = "queerliblib"
    # If Thunder's CORS blocks the deploy origin, route through a proxy instead
    # (same normalized output); the proxy function is a deployment artifact:
    #   transport = "proxied"
    #   proxyUrl  = "https://your-edge-function.example/availability"
